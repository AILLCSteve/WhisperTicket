name: WhisperTicket
options:
  bundleIdPrefix: com.whisperticket
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

targets:
  WhisperTicket:
    type: application
    platform: iOS
    sources:
      - path: ios/WhisperTicket
        excludes:
          - "**/*.json"
    resources:
      - path: ios/WhisperTicket/Resources/MenuV1.sample.json
      - path: ios/WhisperTicket/Assets.xcassets
    info:
      path: ios/WhisperTicket/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIconName: AppIcon
        UILaunchScreen:
          UIColorName: ""
        NSMicrophoneUsageDescription: "WhisperTicket needs your microphone to capture voice orders."
        NSSpeechRecognitionUsageDescription: "WhisperTicket transcribes orders on-device to build tickets."
        ITSAppUsesNonExemptEncryption: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.whisperticket.app
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.4.0"
        CURRENT_PROJECT_VERSION: "4"
        DEVELOPMENT_TEAM: "M37X5J35F8"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
