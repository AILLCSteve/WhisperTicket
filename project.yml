name: WaitTicket
options:
  bundleIdPrefix: com.waitticket
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

targets:
  WaitTicket:
    type: application
    platform: iOS
    sources:
      - path: ios/WaitTicket
        excludes:
          - "**/*.json"
    resources:
      - path: ios/WaitTicket/Resources/MenuV1.sample.json
    info:
      path: ios/WaitTicket/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        NSMicrophoneUsageDescription: "WaitTicket needs your microphone to capture voice orders."
        NSSpeechRecognitionUsageDescription: "WaitTicket transcribes orders on-device to build tickets."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.waitticket.app
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
