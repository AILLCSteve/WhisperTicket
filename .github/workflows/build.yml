name: iOS Build & TestFlight

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Upload to TestFlight
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache xcodegen binary
        id: cache-xcodegen
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/xcodegen
          key: xcodegen-${{ runner.os }}-2.36.0

      - name: Install xcodegen
        if: steps.cache-xcodegen.outputs.cache-hit != 'true'
        run: brew install xcodegen

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: derived-${{ runner.os }}-${{ hashFiles('**/*.swift', 'project.yml') }}
          restore-keys: derived-${{ runner.os }}-

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      # ── Signing: build P12 on CI using native LibreSSL, then keychain import ──
      - name: Install Distribution certificate
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/dist_key.pem"
          CERT_DER_PATH="$RUNNER_TEMP/dist_cert.der"
          CERT_PEM_PATH="$RUNNER_TEMP/dist_cert.pem"
          P12_PATH="$RUNNER_TEMP/dist_cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          P12_PASS="${{ secrets.DIST_CERT_P12_PASSWORD }}"

          # Write private key and certificate
          printf '%s' "${{ secrets.DIST_PRIVATE_KEY_PEM }}" > "$KEY_PATH"
          echo -n "${{ secrets.DIST_CERT_DER_B64 }}" | base64 --decode > "$CERT_DER_PATH"

          # Convert DER → PEM so openssl pkcs12 can read it
          openssl x509 -inform DER -in "$CERT_DER_PATH" -out "$CERT_PEM_PATH"

          # Generate P12 using macOS-native LibreSSL — guarantees keychain compatibility
          openssl pkcs12 -export \
            -in  "$CERT_PEM_PATH" \
            -inkey "$KEY_PATH" \
            -out "$P12_PATH" \
            -passout "pass:$P12_PASS" \
            -name "WhisperTicket Distribution"

          # Import into a dedicated keychain
          security create-keychain -p "temp_keychain_pass" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "temp_keychain_pass" "$KEYCHAIN_PATH"
          security import "$P12_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASS" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "temp_keychain_pass" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      # ── Signing: install App Store provisioning profile ────────────────────
      - name: Install provisioning profile
        run: |
          set -euo pipefail
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_UUID="${{ secrets.PROV_PROFILE_UUID }}"

          printf '%s' "${{ secrets.PROV_PROFILE_BASE64 }}" | base64 -D > "$PROFILE_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" \
             ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"

      # ── App Store Connect API key (for upload) ─────────────────────────────
      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/.private_keys
          printf '%s' "${{ secrets.ASC_API_KEY }}" \
            > ~/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Archive
        run: |
          set -o pipefail
          # Use github.run_number as build number — auto-increments, never conflicts with Apple
          xcodebuild archive \
            -project WhisperTicket.xcodeproj \
            -scheme WhisperTicket \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/WhisperTicket.xcarchive" \
            -configuration Release \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            MARKETING_VERSION="1.4.0" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            2>&1 | tee build.log

      # ── Verify version + bundle resources in archive ───────────────────────
      - name: Verify version in archive
        run: |
          APP="$RUNNER_TEMP/WhisperTicket.xcarchive/Products/Applications/WhisperTicket.app"
          PLIST="$APP/Info.plist"
          echo "=== CFBundleShortVersionString ==="
          /usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" "$PLIST"
          echo "=== CFBundleVersion ==="
          /usr/libexec/PlistBuddy -c "Print CFBundleVersion" "$PLIST"
          echo "=== ITSAppUsesNonExemptEncryption ==="
          /usr/libexec/PlistBuddy -c "Print ITSAppUsesNonExemptEncryption" "$PLIST" || echo "(not set — plist key missing!)"
          echo "=== Bundle JSON resources ==="
          find "$APP" -name "*.json" | sort || echo "(none found)"

      # ── Export + Upload (main branch only) ────────────────────────────────
      - name: Export & Upload to TestFlight
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          set -o pipefail
          cat > /tmp/ExportOptions.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>M37X5J35F8</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.whisperticket.app</key>
              <string>WhisperTicket AppStore</string>
            </dict>
          </dict>
          </plist>
          PLISTEOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/WhisperTicket.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -authenticationKeyPath ~/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            2>&1 | tee -a build.log

      # ── Set compliance + distribute to internal group via ASC API ───────────
      - name: Set compliance & distribute to internal testers
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          KEY_PATH=~/.private_keys/AuthKey_${KEY_ID}.p8
          BUILD_NUMBER="${{ github.run_number }}"

          # ── Generate JWT via Python (avoids openssl DER/RS issues and
          #    LibreSSL fragility; also strips secret whitespace) ───────────
          pip3 install cryptography --quiet 2>/dev/null || true
          JWT=$(python3 scripts/gen_asc_jwt.py "$KEY_PATH" "$KEY_ID" "$ISSUER_ID")
          echo "JWT generated (${#JWT} chars)"

          # ── Find app by bundle ID ───────────────────────────────────────
          # fields[apps]: 'id' is the JSON:API resource identifier — always
          # present, never a valid sparse fieldset attribute (ASC returns 400
          # if you request it). Request only 'name'; id comes free.
          APP_RESP=$(curl -sSf \
            -H "Authorization: Bearer $JWT" \
            "https://api.appstoreconnect.apple.com/v1/apps?filter%5BbundleId%5D=com.whisperticket.app&fields%5Bapps%5D=name")
          APP_ID=$(echo "$APP_RESP" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d['data'][0]['id'])")
          echo "App ID: $APP_ID"

          # ── Wait for build to appear (up to 3 min, checks every 20s) ───
          BUILD_ID=""
          for i in $(seq 1 9); do
            BUILD_RESP=$(curl -sSf \
              -H "Authorization: Bearer $JWT" \
              "https://api.appstoreconnect.apple.com/v1/builds?filter%5Bapp%5D=$APP_ID&filter%5Bversion%5D=$BUILD_NUMBER&sort=-uploadedDate&limit=1&fields%5Bbuilds%5D=processingState,usesNonExemptEncryption" \
              || echo '{"data":[]}')
            BUILD_ID=$(echo "$BUILD_RESP" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d['data'][0]['id'] if d['data'] else '')" 2>/dev/null || echo "")
            if [ -n "$BUILD_ID" ]; then
              echo "Build found: $BUILD_ID"
              break
            fi
            echo "Waiting for build $BUILD_NUMBER to appear in ASC (attempt $i/9)..."
            sleep 20
          done

          if [ -z "$BUILD_ID" ]; then
            echo "⚠️ Build not yet visible in ASC — compliance already set via Info.plist; skipping API distribute."
            exit 0
          fi

          # ── Set usesNonExemptEncryption = false ─────────────────────────
          PATCH_RESP=$(curl -sSf -X PATCH \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d "{\"data\":{\"type\":\"builds\",\"id\":\"$BUILD_ID\",\"attributes\":{\"usesNonExemptEncryption\":false}}}" \
            "https://api.appstoreconnect.apple.com/v1/builds/$BUILD_ID" || echo '{}')
          echo "Compliance set: $(echo "$PATCH_RESP" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('attributes',{}).get('usesNonExemptEncryption','(no response)'))" 2>/dev/null || echo 'done')"

          # ── Find internal beta groups ────────────────────────────────────
          # Use --http1.1 + -o/-w (no -f) to capture the real response body and
          # HTTP status. HTTP/2 + -f masks 4xx errors as exit 56 (curl bug #13411).
          GROUPS_HTTP=$(curl -s --http1.1 \
            -H "Authorization: Bearer $JWT" \
            -o /tmp/betagroups_resp.json \
            -w "%{http_code}" \
            "https://api.appstoreconnect.apple.com/v1/apps/$APP_ID/betaGroups?filter%5BisInternalGroup%5D=true&fields%5BbetaGroups%5D=name" \
            || echo "000")
          echo "=== betaGroups HTTP $GROUPS_HTTP ==="
          cat /tmp/betagroups_resp.json 2>/dev/null || echo "(no response body)"

          if [ "$GROUPS_HTTP" != "200" ]; then
            echo "⚠️ betaGroups API returned HTTP $GROUPS_HTTP — build is in TestFlight; add to groups manually or enable Automatic Distribution in ASC."
            exit 0
          fi

          GROUPS=$(python3 -c \
            "import sys,json; f=open('/tmp/betagroups_resp.json'); d=json.load(f); [print(g['id']+'|'+g['attributes']['name']) for g in d['data']]" 2>/dev/null || echo "")

          if [ -z "$GROUPS" ]; then
            echo "⚠️ No internal beta groups found — add testers manually in ASC once, then enable Automatic Distribution."
            exit 0
          fi

          # ── Add build to each internal group ────────────────────────────
          while IFS='|' read -r GROUP_ID GROUP_NAME; do
            echo "Adding build to group: $GROUP_NAME ($GROUP_ID)"
            curl -sSf -X POST \
              -H "Authorization: Bearer $JWT" \
              -H "Content-Type: application/json" \
              -d "{\"data\":[{\"type\":\"builds\",\"id\":\"$BUILD_ID\"}]}" \
              "https://api.appstoreconnect.apple.com/v1/betaGroups/$GROUP_ID/relationships/builds" \
              && echo "  ✓ Added" || echo "  ⚠️ Already in group or error (non-fatal)"
          done <<< "$GROUPS"

      # ── Export only (PR builds) ────────────────────────────────────────────
      - name: Export IPA (PR builds)
        if: github.event_name == 'pull_request'
        run: |
          set -o pipefail
          cat > /tmp/ExportOptions.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>M37X5J35F8</string>
            <key>destination</key>
            <string>export</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.whisperticket.app</key>
              <string>WhisperTicket AppStore</string>
            </dict>
          </dict>
          </plist>
          PLISTEOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/WhisperTicket.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -authenticationKeyPath ~/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            2>&1 | tee -a build.log

      # ── Artifacts ─────────────────────────────────────────────────────────
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WhisperTicket-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: ignore
