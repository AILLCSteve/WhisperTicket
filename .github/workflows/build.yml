name: iOS Build & TestFlight

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Upload to TestFlight
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      # ── Signing: build P12 on CI using native LibreSSL, then keychain import ──
      - name: Install Distribution certificate
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/dist_key.pem"
          CERT_DER_PATH="$RUNNER_TEMP/dist_cert.der"
          CERT_PEM_PATH="$RUNNER_TEMP/dist_cert.pem"
          P12_PATH="$RUNNER_TEMP/dist_cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          P12_PASS="${{ secrets.DIST_CERT_P12_PASSWORD }}"

          # Write private key and certificate
          printf '%s' "${{ secrets.DIST_PRIVATE_KEY_PEM }}" > "$KEY_PATH"
          echo -n "${{ secrets.DIST_CERT_DER_B64 }}" | base64 --decode > "$CERT_DER_PATH"

          # Convert DER → PEM so openssl pkcs12 can read it
          openssl x509 -inform DER -in "$CERT_DER_PATH" -out "$CERT_PEM_PATH"

          # Generate P12 using macOS-native LibreSSL — guarantees keychain compatibility
          openssl pkcs12 -export \
            -in  "$CERT_PEM_PATH" \
            -inkey "$KEY_PATH" \
            -out "$P12_PATH" \
            -passout "pass:$P12_PASS" \
            -name "WhisperTicket Distribution"

          # Import into a dedicated keychain
          security create-keychain -p "temp_keychain_pass" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "temp_keychain_pass" "$KEYCHAIN_PATH"
          security import "$P12_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASS" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "temp_keychain_pass" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      # ── Signing: install App Store provisioning profile ────────────────────
      - name: Install provisioning profile
        run: |
          set -euo pipefail
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo -n "${{ secrets.PROV_PROFILE_BASE64 }}" | base64 --decode > "$PROFILE_PATH"

          PROFILE_UUID=$(
            security cms -D -i "$PROFILE_PATH" \
            | /usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin
          )
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" \
             ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"

      # ── App Store Connect API key (for upload) ─────────────────────────────
      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/.private_keys
          printf '%s' "${{ secrets.ASC_API_KEY }}" \
            > ~/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project WhisperTicket.xcodeproj \
            -scheme WhisperTicket \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/WhisperTicket.xcarchive" \
            -configuration Release \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            2>&1 | tee build.log

      # ── Export + Upload (main branch only) ────────────────────────────────
      - name: Export & Upload to TestFlight
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          set -o pipefail
          cat > /tmp/ExportOptions.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>M37X5J35F8</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>manual</string>
          </dict>
          </plist>
          PLISTEOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/WhisperTicket.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -authenticationKeyPath ~/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            2>&1 | tee -a build.log

      # ── Export only (PR builds) ────────────────────────────────────────────
      - name: Export IPA (PR builds)
        if: github.event_name == 'pull_request'
        run: |
          set -o pipefail
          cat > /tmp/ExportOptions.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>M37X5J35F8</string>
            <key>destination</key>
            <string>export</string>
            <key>signingStyle</key>
            <string>manual</string>
          </dict>
          </plist>
          PLISTEOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/WhisperTicket.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -authenticationKeyPath ~/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            2>&1 | tee -a build.log

      # ── Artifacts ─────────────────────────────────────────────────────────
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WhisperTicket-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: ignore
