name: iOS Build & TestFlight

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Upload to TestFlight
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      # ── App Store Connect API key — Xcode manages signing automatically ────
      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/.private_keys
          printf '%s' "${{ secrets.ASC_API_KEY }}" \
            > ~/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project WhisperTicket.xcodeproj \
            -scheme WhisperTicket \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/WhisperTicket.xcarchive" \
            -configuration Release \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_STYLE=Automatic \
            2>&1 | tee build.log

      # ── Export + Upload (main branch only) ────────────────────────────────
      - name: Export & Upload to TestFlight
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          set -o pipefail
          cat > /tmp/ExportOptions.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>M37X5J35F8</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          PLISTEOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/WhisperTicket.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            2>&1 | tee -a build.log

      # ── Export only (PR builds) ────────────────────────────────────────────
      - name: Export IPA (PR builds)
        if: github.event_name == 'pull_request'
        run: |
          set -o pipefail
          cat > /tmp/ExportOptions.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>M37X5J35F8</string>
            <key>destination</key>
            <string>export</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          PLISTEOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/WhisperTicket.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            2>&1 | tee -a build.log

      # ── Artifacts ─────────────────────────────────────────────────────────
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WhisperTicket-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: ignore
